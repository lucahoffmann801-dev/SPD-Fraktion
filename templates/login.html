<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – SPD Fraktion KL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            background: #f4f4f4;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Linke Seite – roter Bereich mit Turm-Logo */
        .login-left {
            width: 42%;
            background: linear-gradient(160deg, #C8000D 0%, #E3000F 50%, #FF1A26 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            position: relative;
            overflow: hidden;
        }
        .login-left::before {
            content: '';
            position: absolute;
            bottom: -60px;
            right: -60px;
            width: 260px;
            height: 260px;
            background: rgba(255,255,255,0.06);
            border-radius: 50%;
        }
        .login-left::after {
            content: '';
            position: absolute;
            top: -40px;
            left: -40px;
            width: 180px;
            height: 180px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        .login-left .turm-img {
            height: 260px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 12px 32px rgba(0,0,0,0.45)) drop-shadow(0 4px 12px rgba(0,0,0,0.3));
            position: relative;
            z-index: 1;
        }
        .login-left .tagline {
            color: rgba(255,255,255,0.85);
            font-size: 0.9rem;
            text-align: center;
            margin-top: 1.5rem;
            letter-spacing: 0.04em;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }

        /* Rechte Seite – Login-Formular */
        .login-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2.5rem;
            background: white;
        }
        .login-box {
            width: 100%;
            max-width: 380px;
        }
        .login-logo {
            width: 220px;
            height: auto;
            margin-bottom: 2rem;
        }
        .login-box h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 0.3rem;
        }
        .login-box .subtitle {
            color: #888;
            font-size: 0.88rem;
            margin-bottom: 2rem;
        }
        .form-label {
            font-size: 0.83rem;
            color: #555;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #ddd;
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-control:focus {
            border-color: #E3000F;
            box-shadow: 0 0 0 3px rgba(227,0,15,0.12);
            outline: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #C8000D, #E3000F);
            border: none;
            color: white;
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 10px;
            letter-spacing: 0.03em;
            transition: opacity 0.15s, transform 0.1s;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }
        .alert-danger {
            border-radius: 10px;
            font-size: 0.88rem;
            border: none;
            background: #fff0f0;
            color: #c0000a;
            padding: 0.6rem 1rem;
        }
        .login-footer {
            margin-top: 2.5rem;
            font-size: 0.78rem;
            color: #bbb;
            text-align: center;
        }

        @media (max-width: 768px) {
            .login-left { display: none; }
            .login-right { padding: 2rem 1.5rem; }
        }

        /* Animated background circles */
        .login-left .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.07);
            animation: floatCircle linear infinite;
        }
        @keyframes floatCircle {
            0%   { transform: translateY(0) scale(1); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.2); opacity: 0; }
        }
        .login-left .kl-skyline-small {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            opacity: 0.2;
        }
        .login-box {
            animation: loginBoxIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
        }
        @keyframes loginBoxIn {
            from { opacity:0; transform: scale(0.92) translateY(20px); }
            to   { opacity:1; transform: scale(1) translateY(0); }
        }
        .login-left .turm-img {
            animation: turmIn 0.8s ease-out both;
        }
        @keyframes turmIn {
            from { opacity:0; transform: translateY(30px) scale(0.95); }
            to   { opacity:1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <!-- Linke rote Seite -->
    <div class="login-left">
        <!-- Floating circles -->
        <div class="circle" style="width:80px;height:80px;left:10%;animation-duration:8s;animation-delay:0s;"></div>
        <div class="circle" style="width:40px;height:40px;left:25%;animation-duration:11s;animation-delay:2s;"></div>
        <div class="circle" style="width:120px;height:120px;left:60%;animation-duration:14s;animation-delay:1s;"></div>
        <div class="circle" style="width:55px;height:55px;left:80%;animation-duration:9s;animation-delay:4s;"></div>
        <div class="circle" style="width:30px;height:30px;left:45%;animation-duration:12s;animation-delay:6s;"></div>

        <img src="/static/turm.png" alt="Stadtsilhouette Kaiserslautern" class="turm-img">
        <p class="tagline">Internes Portal der<br><strong style="color:white;">SPD-Fraktion Kaiserslautern</strong></p>

        <!-- KL Skyline small -->
        <svg class="kl-skyline-small" viewBox="0 0 600 80" xmlns="http://www.w3.org/2000/svg" fill="white">
            <rect x="0"   y="55" width="22" height="25"/>
            <rect x="26"  y="45" width="18" height="35"/>
            <rect x="48"  y="50" width="15" height="30"/>
            <rect x="68"  y="40" width="20" height="40"/>
            <!-- Stiftskirche mini -->
            <rect x="96"  y="45" width="12" height="35"/>
            <polygon points="96,45 102,28 108,45"/>
            <rect x="108" y="52" width="25" height="28"/>
            <rect x="133" y="48" width="12" height="32"/>
            <polygon points="133,48 139,31 145,48"/>
            <rect x="152" y="50" width="18" height="30"/>
            <rect x="174" y="42" width="25" height="38"/>
            <!-- Kaiserpfalz mini -->
            <rect x="208" y="44" width="65" height="36"/>
            <rect x="214" y="52" width="10" height="20"/>
            <rect x="228" y="52" width="10" height="20"/>
            <rect x="242" y="52" width="10" height="20"/>
            <rect x="256" y="52" width="10" height="20"/>
            <rect x="231" y="30" width="16" height="50"/>
            <polygon points="231,30 239,18 247,30"/>
            <!-- Rathaus tower mini -->
            <rect x="284" y="53" width="16" height="27"/>
            <rect x="304" y="14" width="30" height="66"/>
            <rect x="338" y="48" width="18" height="32"/>
            <rect x="360" y="40" width="22" height="40"/>
            <rect x="386" y="52" width="16" height="28"/>
            <rect x="406" y="44" width="28" height="36"/>
            <rect x="438" y="50" width="20" height="30"/>
            <rect x="462" y="38" width="30" height="42"/>
            <rect x="496" y="48" width="18" height="32"/>
            <rect x="518" y="42" width="25" height="38"/>
            <rect x="547" y="52" width="20" height="28"/>
            <rect x="571" y="45" width="29" height="35"/>
        </svg>
    </div>

    <!-- Rechte Formular-Seite -->
    <div class="login-right">
        <div class="login-box">
            <img src="/static/logo-rot.png" alt="SPD Fraktion Kaiserslautern" class="login-logo">

            <h1>Willkommen zurück</h1>
            <p class="subtitle">Bitte melde dich mit deinem Zugangspasswort an.</p>

            {% if error %}
            <div class="alert alert-danger mb-3">
                <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="mb-4">
                    <label class="form-label">Passwort</label>
                    <input type="password" name="password" class="form-control"
                           placeholder="Zugangspasswort eingeben" autofocus required>
                </div>
                <button type="submit" class="btn-login">Einloggen</button>
            </form>

            <p class="login-footer">SPD Fraktion Kaiserslautern &middot; Internes Verwaltungsportal</p>
        </div>
    </div>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</body>
</html>
