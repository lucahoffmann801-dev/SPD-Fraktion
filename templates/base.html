<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SPD Fraktion KL{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --spd-rot: #E3000F;
            --spd-dunkel: #9B0000;
            --spd-bg: #f0f2f5;
        }

        body {
            background-color: var(--spd-bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Navbar ── */
        .navbar {
            background: linear-gradient(135deg, #a80009 0%, #C8000D 40%, #E3000F 70%, #ff2d38 100%) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            padding: 0 1.5rem;
            min-height: 66px;
            animation: navbarSlideDown 0.5s ease-out;
            position: sticky;
            top: 0;
            z-index: 1030;
        }
        @keyframes navbarSlideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .navbar-brand { padding: 6px 0; }
        .navbar-brand img {
            height: 48px; width: auto;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25));
            transition: transform 0.3s;
        }
        .navbar-brand:hover img { transform: scale(1.05); }
        .navbar-nav .nav-link {
            color: rgba(255,255,255,0.9) !important;
            font-weight: 500;
            font-size: 0.88rem;
            letter-spacing: 0.02em;
            padding: 0.5rem 0.8rem !important;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s, transform 0.15s;
        }
        .navbar-nav .nav-link:hover {
            color: white !important;
            background: rgba(255,255,255,0.18);
            transform: translateY(-1px);
        }
        .navbar-nav .nav-link.active {
            color: white !important;
            background: rgba(255,255,255,0.25);
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .navbar-nav .nav-link i { margin-right: 4px; }
        .nav-logout .nav-link {
            border: 1px solid rgba(255,255,255,0.35) !important;
            margin-left: 6px;
        }

        /* ── Seiteninhalt ── */
        .main-wrapper {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
        }

        /* ── Cards ── */
        .card {
            border: none;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
            border-radius: 14px;
            overflow: hidden;
            transition: box-shadow 0.25s, transform 0.2s;
        }
        .card:hover {
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }
        .card-header {
            background: linear-gradient(135deg, #C8000D 0%, var(--spd-rot) 100%);
            color: white;
            border: none;
            padding: 0.9rem 1.25rem;
        }
        .card-header h4, .card-header h5, .card-header h6 {
            margin: 0; font-weight: 700; letter-spacing: 0.01em;
        }

        /* ── Buttons ── */
        .btn-spd {
            background: linear-gradient(135deg, #C8000D, var(--spd-rot));
            color: white; border: none; font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(227,0,15,0.3);
        }
        .btn-spd:hover {
            background: linear-gradient(135deg, #a80009, #C8000D);
            color: white; transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(227,0,15,0.45);
        }
        .btn-outline-danger { border-radius: 8px; }

        /* ── Tabellen ── */
        .table thead th {
            background: #f8f8f8; font-size: 0.8rem;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: #666; font-weight: 600; border-bottom: 2px solid #eee;
        }
        .table tbody tr:hover { background: #fff5f5; }

        /* ── Forms ── */
        .form-control, .form-select {
            border-radius: 9px; border: 1.5px solid #ddd; font-size: 0.92rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--spd-rot);
            box-shadow: 0 0 0 3px rgba(227,0,15,0.12);
        }
        .form-label { font-size: 0.83rem; color: #555; margin-bottom: 4px; }

        /* ── Seitenheader ── */
        .page-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem;
            animation: fadeInDown 0.4s ease-out;
        }
        .page-header h2 {
            font-size: 1.4rem; font-weight: 800; color: #1a1a1a; margin: 0;
        }
        .page-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #C8000D, var(--spd-rot));
            color: white; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.15rem; flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(227,0,15,0.35);
        }

        /* ── Animationen ── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }
        @keyframes spin {
            from { transform: rotate(0deg); } to { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.06); }
        }
        @keyframes roseFloat {
            0%   { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            50%  { transform: translateY(-12px) rotate(8deg); opacity: 1; }
            100% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
        }
        @keyframes shimmer {
            0%   { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .anim-fadeup   { animation: fadeInUp 0.5s ease-out both; }
        .anim-delay-1  { animation-delay: 0.08s; }
        .anim-delay-2  { animation-delay: 0.16s; }
        .anim-delay-3  { animation-delay: 0.24s; }
        .anim-delay-4  { animation-delay: 0.32s; }
        .spin          { animation: spin 1s linear infinite; }


        /* ── KL Skyline Footer ── */
        .kl-footer {
            background: linear-gradient(180deg, #1a1a2e 0%, #12121e 100%);
            margin-top: auto;
            overflow: hidden;
            position: relative;
        }
        .kl-footer .skyline-svg {
            display: block; width: 100%; height: 120px;
        }
        .kl-footer .footer-text {
            text-align: center; padding: 10px 0 14px;
            font-size: 0.72rem; color: rgba(255,255,255,0.35);
            letter-spacing: 0.05em; text-transform: uppercase;
        }
        .kl-footer .footer-text strong { color: rgba(255,255,255,0.6); }

        /* ── Badges Quelle ── */
        .badge-email   { background-color: #0d9aaa; }
        .badge-manuell { background-color: #6c757d; }
    </style>
</head>

    <script>
    // Aktiven Nav-Link markieren
    document.querySelectorAll('.navbar-nav .nav-link').forEach(link => {
        if (link.getAttribute('href') === window.location.pathname) {
            link.classList.add('active');
        }
    });

    // Scroll-Animationen für Karten
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
            if (entry.isIntersecting) {
                entry.target.style.animationDelay = (i * 0.05) + 's';
                entry.target.classList.add('anim-fadeup');
                observer.unobserve(entry.target);
            }
        });
    }, { threshold: 0.08 });

    document.querySelectorAll('.card, .termin-karte').forEach(el => observer.observe(el));
    </script>
